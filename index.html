<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlipTrack</title>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0F;font-family:'Inter',-apple-system,sans-serif}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
input,select,textarea,button{font-family:'Inter',sans-serif}
@media(max-width:960px){
  .desktop-sidebar{display:none!important}
  .mobile-topbar{display:flex!important}
  .mainpad{padding:72px 16px 40px!important;margin-left:0!important}
  .stats{grid-template-columns:1fr 1fr!important}
  .grid2{grid-template-columns:1fr!important}
  .colheader{display:none!important}
  .row{grid-template-columns:1fr auto!important}
  .hidemd{display:none!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.onerror=function(msg,src,line){
  document.getElementById('root').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#f87171;padding:40px;text-align:center"><div><div style="font-size:40px">⚠️</div><div style="color:#fff;font-size:18px;font-weight:700;margin:12px 0">Errore</div><div style="background:rgba(244,63,94,0.1);padding:16px;border-radius:12px;font-size:13px;max-width:500px;word-break:break-word">'+msg+'<br><br>Riga: '+line+'</div></div></div>';
};
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const SUPABASE_URL = "https://xrqmjhiubbcemxsuzugu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhycW1qaGl1YmJjZW14c3V6dWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTk4MDEsImV4cCI6MjA5NTAzNTgwMX0.J1iW1S_Q8cAyuft78tb-ds7EqHUCX1lUfYyOxrrrZt8";

const EBAY_SHIPPING = 5.60;
function calcEbayFees(price){ return Math.round(((price*0.0445+0.29)*1.22)*100)/100; }

const HEADERS = {apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};

async function fetchProducts(){
  const res = await fetch(SUPABASE_URL+"/rest/v1/products?select=*&order=created_at.desc",{headers:HEADERS});
  if(!res.ok) throw new Error("Errore Supabase: "+res.status);
  return res.json();
}
async function insertProduct(data){
  const res = await fetch(SUPABASE_URL+"/rest/v1/products",{method:"POST",headers:Object.assign({},HEADERS,{Prefer:"return=representation"}),body:JSON.stringify(data)});
  if(!res.ok) throw new Error("Errore inserimento: "+res.status);
  return res.json();
}
async function updateProduct(id,data){
  const res = await fetch(SUPABASE_URL+"/rest/v1/products?id=eq."+id,{method:"PATCH",headers:Object.assign({},HEADERS,{Prefer:"return=representation"}),body:JSON.stringify(data)});
  if(!res.ok) throw new Error("Errore aggiornamento: "+res.status);
  return res.json();
}

function calcProfit(it){
  if(it.status!=="sold") return null;
  return Math.round(((it.sale_price||0)-(it.purchase_price||0)-(it.sale_shipping||0)-(it.fees||0))*100)/100;
}
function calcRoi(it){
  const p=calcProfit(it); if(p===null) return null;
  const c=it.purchase_price||0; return c?Math.round(p/c*100):null;
}

const platColors={eBay:"#E53238",Vinted:"#09B191",Subito:"#FF6600",Marketplace:"#818cf8"};
const SL={sold:"Venduto",online:"Online",to_publish:"Da pubblicare"};
const SC={sold:"#22C55E",online:"#6C63FF",to_publish:"#F59E0B"};
const SI={sold:"💰",online:"🟢",to_publish:"🏷️"};
const MONTHS=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const NAV=[{id:"dashboard",label:"Dashboard",ic:"⊞"},{id:"acquisti",label:"Acquisti",ic:"↙"},{id:"vendite",label:"Vendite",ic:"↗"},{id:"stock",label:"Stock",ic:"◉"}];
const C={accent:"#6C63FF",green:"#22C55E",red:"#F43F5E",yellow:"#F59E0B"};

function monthlyProfit(items){
  const m={};
  items.filter(i=>i.status==="sold"&&i.sale_date).forEach(i=>{
    const k=new Date(i.sale_date).getMonth();
    m[k]=(m[k]||0)+(calcProfit(i)||0);
  });
  return Object.keys(m).sort((a,b)=>+a-+b).map(k=>({month:MONTHS[k],profit:Math.round(m[k]*100)/100}));
}
function avgDays(items){
  const s=items.filter(i=>i.status==="sold"&&i.sale_date&&i.purchase_date);
  if(!s.length) return null;
  return Math.round(s.reduce((a,i)=>a+(new Date(i.sale_date)-new Date(i.purchase_date))/864e5,0)/s.length);
}
function byCategory(items){
  const m={};
  items.filter(i=>i.status==="sold").forEach(i=>{
    const c=i.category||"Altro",p=calcProfit(i)||0,cost=i.purchase_price||0;
    if(!m[c])m[c]={profit:0,count:0,invested:0};
    m[c].profit+=p;m[c].count++;m[c].invested+=cost;
  });
  return Object.entries(m).map(([cat,v])=>({cat,profit:Math.round(v.profit*100)/100,count:v.count,margin:v.invested?Math.round(v.profit/v.invested*100):0})).sort((a,b)=>b.profit-a.profit);
}

const inp={width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"11px 13px",color:"#e2e8f0",fontSize:14,outline:"none"};
const lbl={display:"block",fontSize:10,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:6};
const card={background:"#0F0F1A",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"22px 24px"};
const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",backdropFilter:"blur(16px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"};
const modal={background:"#0F0F1A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:32,width:520,maxWidth:"95vw",maxHeight:"94vh",overflowY:"auto",position:"relative"};
const sidebarS={width:240,minWidth:240,background:"#0F0F1A",borderRight:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",padding:"32px 0 24px",position:"fixed",top:0,left:0,height:"100vh",zIndex:50};

function pill(color){return{fontSize:10,fontWeight:600,padding:"4px 10px",borderRadius:20,whiteSpace:"nowrap",background:color+"22",color,border:"1px solid "+color+"44",display:"inline-flex",alignItems:"center",gap:4}}
function Pill({status}){const c=SC[status]||"#888";return <span style={pill(c)}>{SI[status]||"○"} {SL[status]||status}</span>}

function Label({children}){return <label style={lbl}>{children}</label>}
function Input({value,onChange,type,placeholder}){return <input style={inp} value={value||""} onChange={onChange} type={type||"text"} placeholder={placeholder||""}/>}
function Select({value,onChange,children}){return <select style={inp} value={value||""} onChange={onChange}>{children}</select>}
function FieldRow({children,cols}){return <div style={{display:"grid",gridTemplateColumns:cols||"1fr 1fr",gap:12,marginBottom:13}}>{children}</div>}
function Field({label,children}){return <div style={{marginBottom:13}}><Label>{label}</Label>{children}</div>}
function SectionTitle({children}){return <div style={{fontSize:10,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,margin:"20px 0 14px",paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.06)"}}>{children}</div>}

function StatCard({label,val,sub,color}){
  return <div style={{background:"#0F0F1A",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"20px 22px",position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 5% 90%,"+color+"18,transparent 60%)",pointerEvents:"none"}}/>
    <div style={{fontSize:11,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:8}}>{label}</div>
    <div style={{fontSize:30,fontWeight:800,letterSpacing:-1.5,lineHeight:1,marginBottom:4,color}}>{val}</div>
    <div style={{fontSize:11,color:"#3a3a5a"}}>{sub}</div>
  </div>;
}

function BarChart({data}){
  if(!data.length) return <div style={{color:"#2a2a4a",fontSize:13,textAlign:"center",padding:"40px 0"}}>Nessuna vendita ancora</div>;
  const maxV=Math.max(...data.map(d=>d.profit));
  return <div style={{display:"flex",alignItems:"flex-end",gap:8,height:150,paddingTop:16}}>
    {data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,height:"100%",justifyContent:"flex-end"}}>
      <div style={{fontSize:10,fontWeight:700,color:"#A5A0FF"}}>€{d.profit}</div>
      <div style={{width:"100%",maxWidth:36,borderRadius:"5px 5px 0 0",background:C.accent,opacity:i===data.length-1?1:0.5,height:Math.max(4,Math.round(d.profit/maxV*100))+"px"}}/>
      <div style={{fontSize:10,color:"#3a3a5a"}}>{d.month}</div>
    </div>)}
  </div>;
}

function ItemRow({item,onClick}){
  const profit=calcProfit(item),roi=calcRoi(item),accent=SC[item.status]||"#555",pc=platColors[item.purchase_platform]||"#818cf8";
  return <div onClick={()=>onClick(item)} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.055)",borderRadius:10,padding:"14px 16px",display:"grid",gridTemplateColumns:"1fr 90px 90px 110px 95px 100px 24px",alignItems:"center",gap:10,cursor:"pointer",marginBottom:5,position:"relative",overflow:"hidden"}} className="row">
    <div style={{position:"absolute",left:0,top:"20%",bottom:"20%",width:2.5,background:accent,borderRadius:"0 2px 2px 0"}}/>
    <div>
      <div style={{fontSize:13,fontWeight:600,color:"#d0d0e8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",paddingLeft:10}}>{item.product_name}</div>
      <div style={{fontSize:10,color:"#2a2a4a",marginTop:2,paddingLeft:10}}>{item.category} · {item.purchase_date}</div>
    </div>
    <div className="hidemd" style={{fontSize:14,fontWeight:700,textAlign:"right",color:C.red}}>€{item.purchase_price}</div>
    <div className="hidemd" style={{fontSize:14,fontWeight:700,textAlign:"right",color:item.status==="sold"?C.green:"#2a2a4a"}}>{item.status==="sold"?"€"+item.sale_price:"—"}</div>
    <div className="hidemd" style={{textAlign:"right"}}>
      <div style={{fontSize:14,fontWeight:700,color:profit!=null?(profit>=0?C.green:C.red):"#2a2a4a"}}>{profit!=null?(profit>=0?"+":"")+"€"+profit.toFixed(2):"—"}</div>
      {roi!=null&&<div style={{fontSize:10,color:"#2a2a4a"}}>{roi}% roi</div>}
    </div>
    <span className="hidemd" style={pill(pc)}>{item.purchase_platform||"—"}</span>
    <div className="hidemd"><Pill status={item.status}/></div>
    <div className="hidemd" style={{color:"#2a2a4a",textAlign:"right"}}>›</div>
  </div>;
}

// ── MODAL DETTAGLIO (readonly + bottone modifica) ──
function DetailModal({item,onClose,onEdit}){
  const profit=calcProfit(item),roi=calcRoi(item);
  return <div style={overlay} onClick={onClose}>
    <div style={modal} onClick={e=>e.stopPropagation()}>
      <button style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.07)",border:"none",color:"#888",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:16}} onClick={onClose}>×</button>
      <div style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:4,paddingRight:40}}>{item.product_name}</div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}><span style={{fontSize:11,color:"#3a3a5a"}}>{item.category}</span><Pill status={item.status}/></div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {l:"Costo acquisto",v:"€"+(item.purchase_price||0),c:C.red},
          {l:"Prezzo vendita",v:item.sale_price?"€"+item.sale_price:"—",c:C.green},
          {l:"Profitto",v:profit!=null?(profit>=0?"+":"")+"€"+profit.toFixed(2):"—",c:profit!=null?(profit>=0?C.green:C.red):"#2a2a4a"},
          {l:"ROI",v:roi!=null?roi+"%":"—",c:roi!=null?C.yellow:"#2a2a4a"},
        ].map(b=><div key={b.l} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:0.7,color:"#3a3a5a",marginBottom:6}}>{b.l}</div>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:-1,color:b.c}}>{b.v}</div>
        </div>)}
      </div>

      {item.status==="sold"&&(item.sale_shipping||item.fees)?<div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"12px 16px",marginBottom:14,fontSize:12,color:"#5a5a7a"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>🚚 Spedizione</span><span>-€{(item.sale_shipping||0).toFixed(2)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between"}}><span>💸 Commissioni</span><span>-€{(item.fees||0).toFixed(2)}</span></div>
      </div>:null}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        {[["Acquistato su",item.purchase_platform||"—"],["Venduto su",item.sale_platform||"—"],["Data acquisto",item.purchase_date||"—"],["Data vendita",item.sale_date||"—"],["Prezzo listing",item.listing_price?"€"+item.listing_price:"—"],["Data listing",item.listing_date||"—"]].map(([k,v])=><div key={k} style={{background:"rgba(255,255,255,0.025)",borderRadius:10,padding:"10px 12px"}}>
          <div style={{fontSize:10,fontWeight:600,color:"#2a2a4a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:3}}>{k}</div>
          <div style={{fontSize:13,color:"#9090b0",fontWeight:500}}>{v}</div>
        </div>)}
      </div>

      {item.notes&&<div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:8}}>Note</div>
        <div style={{fontSize:13,color:"#7070a0",lineHeight:1.6}}>{item.notes}</div>
      </div>}

      <button onClick={onEdit} style={{width:"100%",background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:13,fontWeight:700,fontSize:14,cursor:"pointer"}}>✏️ Modifica articolo</button>
    </div>
  </div>;
}

// ── MODAL MODIFICA (tutti i campi editabili) ──
function EditModal({item,onClose,onSaved}){
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState(null);
  const [f,setF]=useState({
    product_name:item.product_name||"",
    category:item.category||"videogame",
    status:item.status||"online",
    purchase_platform:item.purchase_platform||"Subito",
    purchase_price:item.purchase_price||"",
    purchase_date:item.purchase_date||"",
    sale_platform:item.sale_platform||"eBay",
    sale_price:item.sale_price||"",
    sale_shipping:item.sale_shipping||"",
    fees:item.fees||"",
    sale_date:item.sale_date||"",
    listing_platform:"",
    listing_price:item.listing_price||"",
    listing_date:item.listing_date||"",
    notes:item.notes||"",
  });
  const set=(k,v)=>setF(x=>Object.assign({},x,{[k]:v}));

  const isSold=f.status==="sold";
  const autoFees=f.sale_platform==="eBay"&&f.sale_price?calcEbayFees(parseFloat(f.sale_price)||0):null;
  const autoShipping=f.sale_platform==="eBay"?EBAY_SHIPPING:null;

  const save=async()=>{
    if(!f.product_name||!f.purchase_price){setErr("Compila almeno nome e prezzo acquisto.");return}
    setSaving(true);setErr(null);
    try{
      const payload={
        product_name:f.product_name,
        category:f.category,
        status:f.status,
        purchase_platform:f.purchase_platform,
        purchase_price:parseFloat(f.purchase_price)||0,
        purchase_shipping:0,
        purchase_date:f.purchase_date||null,
        sale_platform:isSold?(f.sale_platform||null):null,
        sale_price:isSold?(parseFloat(f.sale_price)||0):0,
        sale_shipping:isSold?(f.sale_platform==="eBay"?EBAY_SHIPPING:(parseFloat(f.sale_shipping)||0)):0,
        fees:isSold?(f.sale_platform==="eBay"?calcEbayFees(parseFloat(f.sale_price)||0):(parseFloat(f.fees)||0)):0,
        sale_date:isSold?(f.sale_date||null):null,
        listing_price:parseFloat(f.listing_price)||0,
        listing_date:f.listing_date||null,
        notes:f.notes||null,
        profit:0,
      };
      await updateProduct(item.id,payload);
      onSaved();onClose();
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  };

  return <div style={overlay} onClick={onClose}>
    <div style={modal} onClick={e=>e.stopPropagation()}>
      <button style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.07)",border:"none",color:"#888",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:16}} onClick={onClose}>×</button>
      <div style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:20}}>✏️ Modifica articolo</div>

      {err&&<div style={{background:"rgba(244,63,94,0.08)",border:"1px solid rgba(244,63,94,0.2)",borderRadius:10,padding:"12px 14px",color:"#f87171",fontSize:13,marginBottom:14}}>{err}</div>}

      <Field label="Nome articolo *"><Input value={f.product_name} onChange={e=>set("product_name",e.target.value)} placeholder="es. Nintendo 3DS XL"/></Field>

      <FieldRow>
        <Field label="Categoria"><Select value={f.category} onChange={e=>set("category",e.target.value)}><option value="videogame">Videogioco</option><option value="console">Console</option><option value="accessory">Accessorio</option></Select></Field>
        <Field label="Stato"><Select value={f.status} onChange={e=>set("status",e.target.value)}>
          {Object.entries(SL).map(([k,v])=><option key={k} value={k}>{SI[k]} {v}</option>)}
        </Select></Field>
      </FieldRow>

      <SectionTitle>📥 Acquisto</SectionTitle>
      <FieldRow>
        <Field label="Prezzo acquisto (€) *"><Input value={f.purchase_price} onChange={e=>set("purchase_price",e.target.value)} type="number" placeholder="0.00"/></Field>
        <Field label="Piattaforma acquisto"><Select value={f.purchase_platform} onChange={e=>set("purchase_platform",e.target.value)}><option>Subito</option><option>Vinted</option><option>eBay</option><option>Marketplace</option><option>Altra</option></Select></Field>
      </FieldRow>
      <Field label="Data acquisto"><Input value={f.purchase_date} onChange={e=>set("purchase_date",e.target.value)} type="date"/></Field>

      <SectionTitle>📤 Vendita</SectionTitle>
      <FieldRow>
        <Field label="Prezzo vendita (€)"><Input value={f.sale_price} onChange={e=>set("sale_price",e.target.value)} type="number" placeholder="0.00"/></Field>
        <Field label="Piattaforma vendita"><Select value={f.sale_platform} onChange={e=>set("sale_platform",e.target.value)}><option>eBay</option><option>Vinted</option><option>Subito</option><option>Altra</option></Select></Field>
      </FieldRow>

      {f.sale_platform==="eBay"&&f.sale_price?<div style={{background:"rgba(108,99,255,0.08)",border:"1px solid rgba(108,99,255,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:12,color:"#9090c0"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>🚚 Spedizione eBay (automatica)</span><span style={{color:"#A5A0FF",fontWeight:700}}>-€{EBAY_SHIPPING.toFixed(2)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span>💸 Commissioni eBay (calcolate)</span><span style={{color:"#A5A0FF",fontWeight:700}}>-€{calcEbayFees(parseFloat(f.sale_price)).toFixed(2)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid rgba(108,99,255,0.2)",paddingTop:8}}>
          <span style={{fontWeight:600,color:"#c0c0e0"}}>Profitto stimato</span>
          <span style={{fontWeight:700,color:((parseFloat(f.sale_price)||0)-(parseFloat(f.purchase_price)||0)-EBAY_SHIPPING-calcEbayFees(parseFloat(f.sale_price)||0))>=0?C.green:C.red}}>
            {((parseFloat(f.sale_price)||0)-(parseFloat(f.purchase_price)||0)-EBAY_SHIPPING-calcEbayFees(parseFloat(f.sale_price)||0)).toFixed(2)} €
          </span>
        </div>
      </div>:null}

      {f.sale_platform!=="eBay"?<FieldRow>
        <Field label="Spedizione vendita (€)"><Input value={f.sale_shipping} onChange={e=>set("sale_shipping",e.target.value)} type="number" placeholder="0.00"/></Field>
        <Field label="Commissioni (€)"><Input value={f.fees} onChange={e=>set("fees",e.target.value)} type="number" placeholder="0.00"/></Field>
      </FieldRow>:null}

      <Field label="Data vendita"><Input value={f.sale_date} onChange={e=>set("sale_date",e.target.value)} type="date"/></Field>

      <SectionTitle>🏷️ Listing</SectionTitle>
      <FieldRow>
        <Field label="Prezzo listing (€)"><Input value={f.listing_price} onChange={e=>set("listing_price",e.target.value)} type="number" placeholder="0.00"/></Field>
        <Field label="Data listing"><Input value={f.listing_date} onChange={e=>set("listing_date",e.target.value)} type="date"/></Field>
      </FieldRow>

      <Field label="Note"><textarea style={Object.assign({},inp,{minHeight:80,resize:"vertical",lineHeight:1.6})} value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Note libere..."/></Field>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:4}}>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#888",borderRadius:10,padding:13,fontWeight:600,fontSize:14,cursor:"pointer"}}>Annulla</button>
        <button onClick={save} disabled={saving} style={{background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:13,fontWeight:700,fontSize:14,cursor:"pointer",opacity:saving?0.6:1}}>{saving?"Salvataggio...":"💾 Salva modifiche"}</button>
      </div>
    </div>
  </div>;
}

// ── MODAL NUOVO ARTICOLO ──
function FormModal({onClose,onSaved}){
  const [saving,setSaving]=useState(false),[err,setErr]=useState(null);
  const [salePlat,setSalePlat]=useState("eBay");
  const [salePrice,setSalePrice]=useState("");
  const [f,setF]=useState({product_name:"",category:"videogame",purchase_platform:"Subito",purchase_price:"",purchase_date:"",listing_date:"",listing_price:"",status:"online",notes:""});
  const set=(k,v)=>setF(x=>Object.assign({},x,{[k]:v}));
  const isSold=f.status==="sold";
  const autoFees=salePlat==="eBay"&&salePrice?calcEbayFees(parseFloat(salePrice)||0):0;

  const save=async()=>{
    if(!f.product_name||!f.purchase_price||!f.purchase_date){setErr("Compila nome, prezzo e data acquisto.");return}
    setSaving(true);setErr(null);
    try{
      await insertProduct({
        product_name:f.product_name,category:f.category,
        purchase_platform:f.purchase_platform,
        purchase_price:parseFloat(f.purchase_price)||0,
        purchase_shipping:0,
        purchase_date:f.purchase_date||null,
        sale_platform:isSold?salePlat:null,
        sale_price:isSold?parseFloat(salePrice)||0:0,
        sale_shipping:isSold?(salePlat==="eBay"?EBAY_SHIPPING:0):0,
        fees:isSold?autoFees:0,
        sale_date:isSold?(f.purchase_date||null):null,
        listing_date:f.listing_date||null,
        listing_price:parseFloat(f.listing_price)||0,
        status:f.status,notes:f.notes||null,profit:0
      });
      onSaved();onClose();
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  };

  return <div style={overlay} onClick={onClose}>
    <div style={modal} onClick={e=>e.stopPropagation()}>
      <button style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.07)",border:"none",color:"#888",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:16}} onClick={onClose}>×</button>
      <div style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:20}}>+ Nuovo articolo</div>
      {err&&<div style={{background:"rgba(244,63,94,0.08)",border:"1px solid rgba(244,63,94,0.2)",borderRadius:10,padding:"12px 14px",color:"#f87171",fontSize:13,marginBottom:14}}>{err}</div>}

      <Field label="Nome articolo *"><Input value={f.product_name} onChange={e=>set("product_name",e.target.value)} placeholder="es. Nintendo 3DS XL Animal Crossing"/></Field>

      <FieldRow>
        <Field label="Categoria"><Select value={f.category} onChange={e=>set("category",e.target.value)}><option value="videogame">Videogioco</option><option value="console">Console</option><option value="accessory">Accessorio</option></Select></Field>
        <Field label="Stato"><Select value={f.status} onChange={e=>set("status",e.target.value)}>
          {Object.entries(SL).map(([k,v])=><option key={k} value={k}>{SI[k]} {v}</option>)}
        </Select></Field>
      </FieldRow>

      <SectionTitle>📥 Acquisto</SectionTitle>
      <FieldRow>
        <Field label="Prezzo acquisto (€) *"><Input value={f.purchase_price} onChange={e=>set("purchase_price",e.target.value)} type="number" placeholder="0.00"/></Field>
        <Field label="Piattaforma acquisto"><Select value={f.purchase_platform} onChange={e=>set("purchase_platform",e.target.value)}><option>Subito</option><option>Vinted</option><option>eBay</option><option>Marketplace</option><option>Altra</option></Select></Field>
      </FieldRow>
      <Field label="Data acquisto *"><Input value={f.purchase_date} onChange={e=>set("purchase_date",e.target.value)} type="date"/></Field>

      {isSold&&<div>
        <SectionTitle>📤 Vendita</SectionTitle>
        <FieldRow>
          <Field label="Prezzo vendita (€)"><Input value={salePrice} onChange={e=>setSalePrice(e.target.value)} type="number" placeholder="0.00"/></Field>
          <Field label="Piattaforma vendita"><Select value={salePlat} onChange={e=>setSalePlat(e.target.value)}><option>eBay</option><option>Vinted</option><option>Subito</option><option>Altra</option></Select></Field>
        </FieldRow>
        {salePlat==="eBay"&&salePrice&&<div style={{background:"rgba(108,99,255,0.08)",border:"1px solid rgba(108,99,255,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:12,color:"#9090c0"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>🚚 Spedizione eBay</span><span style={{color:"#A5A0FF",fontWeight:700}}>-€{EBAY_SHIPPING.toFixed(2)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span>💸 Commissioni eBay</span><span style={{color:"#A5A0FF",fontWeight:700}}>-€{autoFees.toFixed(2)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid rgba(108,99,255,0.2)",paddingTop:8}}>
            <span style={{fontWeight:600,color:"#c0c0e0"}}>Profitto stimato</span>
            <span style={{fontWeight:700,color:((parseFloat(salePrice)||0)-(parseFloat(f.purchase_price)||0)-EBAY_SHIPPING-autoFees)>=0?C.green:C.red}}>
              {((parseFloat(salePrice)||0)-(parseFloat(f.purchase_price)||0)-EBAY_SHIPPING-autoFees).toFixed(2)} €
            </span>
          </div>
        </div>}
      </div>}

      <SectionTitle>🏷️ Listing (opzionale)</SectionTitle>
      <FieldRow>
        <Field label="Prezzo listing (€)"><Input value={f.listing_price} onChange={e=>set("listing_price",e.target.value)} type="number" placeholder="0.00"/></Field>
        <Field label="Data listing"><Input value={f.listing_date} onChange={e=>set("listing_date",e.target.value)} type="date"/></Field>
      </FieldRow>

      <Field label="Note"><textarea style={Object.assign({},inp,{minHeight:80,resize:"vertical",lineHeight:1.6})} value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Dove l'hai trovato, prezzo obiettivo..."/></Field>

      <button onClick={save} disabled={saving} style={{width:"100%",background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:13,fontWeight:700,fontSize:14,cursor:"pointer",opacity:saving?0.6:1}}>{saving?"Salvataggio...":"+ Salva articolo"}</button>
    </div>
  </div>;
}

function RowList({items,onSelect}){
  if(!items.length) return <div style={{color:"#2a2a4a",fontSize:13,textAlign:"center",padding:"40px 0"}}>Nessun articolo.</div>;
  return <div>
    <div className="colheader" style={{display:"grid",gridTemplateColumns:"1fr 90px 90px 110px 95px 100px 24px",gap:10,padding:"0 16px 10px",fontSize:10,fontWeight:600,color:"#2a2a4a",textTransform:"uppercase",letterSpacing:0.7}}>
      <div style={{paddingLeft:10}}>Articolo</div><div style={{textAlign:"right"}}>Acquisto</div><div style={{textAlign:"right"}}>Vendita</div><div style={{textAlign:"right"}}>Profitto</div><div>Comprato su</div><div>Stato</div><div/>
    </div>
    {items.map(i=><ItemRow key={i.id} item={i} onClick={onSelect}/>)}
  </div>;
}

function NavItems({page,setPage,badges,onClose}){
  return NAV.map(n=><div key={n.id} onClick={()=>{setPage(n.id);onClose&&onClose();}} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:500,color:page===n.id?"#A5A0FF":"#4a4a6a",background:page===n.id?"rgba(108,99,255,0.15)":"transparent",marginBottom:2}}>
    <span style={{fontSize:18}}>{n.ic}</span>{n.label}
    <span style={{marginLeft:"auto",fontSize:11,fontWeight:600,background:page===n.id?"rgba(108,99,255,0.2)":"rgba(255,255,255,0.05)",color:page===n.id?"#A5A0FF":"#4a4a6a",padding:"2px 8px",borderRadius:20}}>{badges[n.id]}</span>
  </div>);
}

function App(){
  const [page,setPage]=useState("dashboard");
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [selected,setSelected]=useState(null);
  const [editing,setEditing]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);

  const load=async()=>{
    setLoading(true);setError(null);
    try{const d=await fetchProducts();setItems(d)}catch(e){setError(e.message)}finally{setLoading(false)}
  };
  useEffect(()=>{load();},[]);

  const sold=items.filter(i=>i.status==="sold");
  const inStock=items.filter(i=>i.status!=="sold");
  const badges={dashboard:items.length,acquisti:items.length,vendite:sold.length,stock:inStock.length};
  const meta={dashboard:"Dashboard",acquisti:"Acquisti",vendite:"Vendite",stock:"Stock"};
  const subs={dashboard:"Panoramica della tua attività",acquisti:"Tutti gli articoli",vendite:"Articoli venduti e profitti",stock:"Articoli online e da pubblicare"};

  const inv=items.reduce((s,i)=>s+(i.purchase_price||0),0);
  const profit=sold.reduce((s,i)=>s+(calcProfit(i)||0),0);
  const rev=sold.reduce((s,i)=>s+(i.sale_price||0),0);
  const days=avgDays(items);
  const roi=sold.length?Math.round(profit/Math.max(1,sold.reduce((s,i)=>s+(i.purchase_price||0),0))*100):0;

  let content;
  if(loading) content=<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"80px 0",gap:14,color:"#3a3a5a"}}>
    <div className="spin" style={{width:32,height:32,border:"3px solid rgba(108,99,255,0.2)",borderTopColor:C.accent,borderRadius:"50%"}}/>
    <span style={{fontSize:13}}>Caricamento...</span>
  </div>;
  else if(page==="dashboard"){
    const mData=monthlyProfit(items),cats=byCategory(items),maxP=cats.length?cats[0].profit:1;
    content=<div>
      <div className="stats" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:28}}>
        <StatCard label="Profitto netto" val={"+€"+profit.toFixed(2)} sub={"ROI medio "+roi+"%"} color={C.green}/>
        <StatCard label="Capitale invest." val={"€"+inv.toFixed(2)} sub={items.length+" articoli"} color={C.red}/>
        <StatCard label="Incassato" val={"€"+rev.toFixed(2)} sub={sold.length+" vendite"} color={C.accent}/>
        <StatCard label="Tempo medio" val={days!=null?days+"gg":"—"} sub="giorni per vendere" color={C.yellow}/>
      </div>
      <div className="grid2" style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:16,marginBottom:16}}>
        <div style={card}><div style={{fontSize:12,fontWeight:600,color:"#4a4a6a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:18}}>Profitti mensili</div><BarChart data={mData}/></div>
        <div style={card}>
          <div style={{fontSize:12,fontWeight:600,color:"#4a4a6a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:18}}>Categorie</div>
          {cats.map(c=><div key={c.cat} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,fontWeight:600,color:"#c0c0e0"}}>{c.cat}</span><span style={{fontSize:13,fontWeight:700,color:"#fff"}}>+€{c.profit.toFixed(2)}</span></div>
            <div style={{height:5,background:"rgba(255,255,255,0.05)",borderRadius:10,overflow:"hidden"}}><div style={{height:"100%",borderRadius:10,width:Math.round(c.profit/maxP*100)+"%",background:C.accent}}/></div>
            <div style={{fontSize:10,color:"#3a3a5a",marginTop:4}}>Margine {c.margin}% · {c.count} venduti</div>
          </div>)}
        </div>
      </div>
      <div style={{fontSize:11,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:12,marginTop:16}}>Attività recente</div>
      <RowList items={items.slice(0,6)} onSelect={setSelected}/>
    </div>;
  }
  else if(page==="acquisti") content=<div>
    <div className="stats" style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14,marginBottom:28}}>
      <StatCard label="Totale investito" val={"€"+inv.toFixed(2)} sub={items.length+" acquisti"} color={C.red}/>
      <StatCard label="Spesa media" val={"€"+(items.length?Math.round(inv/items.length*100)/100:0)} sub="per articolo" color={C.accent}/>
    </div>
    <RowList items={items} onSelect={setSelected}/>
  </div>;
  else if(page==="vendite") content=<div>
    <div className="stats" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:28}}>
      <StatCard label="Venduti" val={sold.length} sub="completati" color={C.green}/>
      <StatCard label="Incassato" val={"€"+rev.toFixed(2)} sub="totale" color={C.green}/>
      <StatCard label="Profitto" val={"+€"+profit.toFixed(2)} sub={"ROI medio "+roi+"%"} color={C.yellow}/>
    </div>
    <RowList items={sold} onSelect={setSelected}/>
  </div>;
  else if(page==="stock") content=<div>
    <div className="stats" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:28}}>
      <StatCard label="In stock" val={inStock.length} sub="da vendere" color={C.yellow}/>
      <StatCard label="Online" val={items.filter(i=>i.status==="online").length} sub="in vendita" color={C.accent}/>
      <StatCard label="Da pubblicare" val={items.filter(i=>i.status==="to_publish").length} sub="da listare" color={SC.to_publish}/>
    </div>
    <RowList items={inStock} onSelect={setSelected}/>
  </div>;

  const logoEl=<div><div style={{fontSize:20,fontWeight:800,color:"#fff"}}>Flip<span style={{color:C.accent}}>Track</span></div><div style={{fontSize:11,color:"#3a3a5a",marginTop:4}}>videogiochi & console</div></div>;
  const addBtn=<button style={{width:"100%",background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:12,fontWeight:700,fontSize:14,cursor:"pointer"}} onClick={()=>setShowForm(true)}>+ Nuovo articolo</button>;

  return <div style={{display:"flex",minHeight:"100vh",background:"#0A0A0F",color:"#E2E8F0",fontSize:14}}>

    {/* Desktop sidebar */}
    <aside className="desktop-sidebar" style={sidebarS}>
      <div style={{padding:"0 24px 28px",borderBottom:"1px solid rgba(255,255,255,0.06)",marginBottom:16}}>{logoEl}</div>
      <nav style={{flex:1,padding:"0 12px"}}><NavItems page={page} setPage={setPage} badges={badges}/></nav>
      <div style={{padding:"16px 12px 0",borderTop:"1px solid rgba(255,255,255,0.06)"}}>{addBtn}</div>
    </aside>

    {/* Mobile overlay sidebar */}
    {menuOpen&&<div>
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:40}} onClick={()=>setMenuOpen(false)}/>
      <aside style={Object.assign({},sidebarS,{boxShadow:"4px 0 40px rgba(0,0,0,0.6)"})}>
        <div style={{padding:"0 24px 28px",borderBottom:"1px solid rgba(255,255,255,0.06)",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          {logoEl}
          <button onClick={()=>setMenuOpen(false)} style={{background:"rgba(255,255,255,0.07)",border:"none",color:"#888",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:18,flexShrink:0}}>×</button>
        </div>
        <nav style={{flex:1,padding:"0 12px"}}><NavItems page={page} setPage={setPage} badges={badges} onClose={()=>setMenuOpen(false)}/></nav>
        <div style={{padding:"16px 12px 0",borderTop:"1px solid rgba(255,255,255,0.06)"}}>{addBtn}</div>
      </aside>
    </div>}

    {/* Mobile topbar */}
    <div className="mobile-topbar" style={{display:"none",position:"fixed",top:0,left:0,right:0,height:56,background:"rgba(10,10,15,0.97)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,0.07)",zIndex:30,alignItems:"center",justifyContent:"space-between",padding:"0 16px"}}>
      <button onClick={()=>setMenuOpen(true)} style={{background:"rgba(255,255,255,0.07)",border:"none",color:"#fff",width:38,height:38,borderRadius:10,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>☰</button>
      <div style={{fontSize:17,fontWeight:800,color:"#fff"}}>Flip<span style={{color:C.accent}}>Track</span></div>
      <button onClick={()=>setShowForm(true)} style={{background:C.accent,border:"none",color:"#fff",width:38,height:38,borderRadius:10,cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
    </div>

    {/* Main */}
    <main className="mainpad" style={{flex:1,minWidth:0,padding:"40px 40px 60px",marginLeft:240}}>
      <div style={{marginBottom:32,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12,alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.8,color:"#fff"}}>{meta[page]}</div>
          <div style={{fontSize:13,color:"#3a3a5a",marginTop:4}}>{subs[page]}</div>
        </div>
        <button style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#4a4a6a",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:12}} onClick={load}>↻ Aggiorna</button>
      </div>
      {error&&<div style={{background:"rgba(244,63,94,0.08)",border:"1px solid rgba(244,63,94,0.2)",borderRadius:12,padding:"16px 20px",color:"#f87171",fontSize:13,marginBottom:20}}>{error}</div>}
      {content}
    </main>

    {/* Modals */}
    {selected&&!editing&&<DetailModal item={selected} onClose={()=>setSelected(null)} onEdit={()=>{setEditing(selected);setSelected(null)}}/>}
    {editing&&<EditModal item={editing} onClose={()=>setEditing(null)} onSaved={()=>{load();setEditing(null)}}/>}
    {showForm&&<FormModal onClose={()=>setShowForm(false)} onSaved={load}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
