<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlipTrack</title>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A0A0F;font-family:'Inter',-apple-system,sans-serif}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .spin{animation:spin 1s linear infinite}
  input,select,textarea,button{font-family:'Inter',sans-serif}
  @media(max-width:960px){
    .sidebar{display:none!important}
    .mobnav{display:flex!important}
    .fab{display:flex!important}
    .mainpad{padding:24px 16px 110px!important}
    .stats{grid-template-columns:1fr 1fr!important}
    .grid2{grid-template-columns:1fr!important}
    .colheader{display:none!important}
    .row{grid-template-columns:1fr auto!important}
    .hidemd{display:none!important}
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
window.onerror=function(msg,src,line,col,err){
  document.getElementById('root').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#f87171;padding:40px;text-align:center"><div><div style="font-size:40px">⚠️</div><div style="color:#fff;font-size:18px;font-weight:700;margin:12px 0">Errore rilevato</div><div style="background:rgba(244,63,94,0.1);padding:16px;border-radius:12px;font-size:13px;max-width:600px;word-break:break-word">'+msg+'<br><br>Riga: '+line+'</div></div></div>';
};
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ─── CREDENZIALI SUPABASE ───
const SUPABASE_URL = "https://xrqmjhiubbcemxsuzugu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhycW1qaGl1YmJjZW14c3V6dWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTk4MDEsImV4cCI6MjA5NTAzNTgwMX0.J1iW1S_Q8cAyuft78tb-ds7EqHUCX1lUfYyOxrrrZt8";
// ─────────────────────────────

async function fetchProducts(){
  const res = await fetch(SUPABASE_URL+"/rest/v1/products?select=*&order=created_at.desc",{
    headers:{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"}
  });
  if(!res.ok) throw new Error("Errore Supabase: "+res.status);
  return res.json();
}
async function insertProduct(data){
  const res = await fetch(SUPABASE_URL+"/rest/v1/products",{
    method:"POST",
    headers:{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY,"Content-Type":"application/json",Prefer:"return=representation"},
    body:JSON.stringify(data)
  });
  if(!res.ok) throw new Error("Errore inserimento: "+res.status);
  return res.json();
}

function calcProfit(it){ if(it.status!=="sold")return null; return (it.sale_price||0)-(it.purchase_price||0)-(it.purchase_shipping||0)-(it.sale_shipping||0)-(it.fees||0); }
function calcRoi(it){ const p=calcProfit(it); if(p===null)return null; const c=(it.purchase_price||0)+(it.purchase_shipping||0); return c?Math.round(p/c*100):null; }

const platColors={eBay:"#E53238",Vinted:"#09B191",Subito:"#FF6600",Marketplace:"#818cf8"};
const SL={sold:"Venduto",online:"Online",to_publish:"Da pubblicare"};
const SC={sold:"#22C55E",online:"#6C63FF",to_publish:"#F59E0B"};
const MONTHS=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const NAV=[{id:"dashboard",label:"Dashboard"},{id:"acquisti",label:"Acquisti"},{id:"vendite",label:"Vendite"},{id:"stock",label:"Stock"}];

function monthlyProfit(items){
  const m={};
  items.filter(i=>i.status==="sold"&&i.sale_date).forEach(i=>{const k=new Date(i.sale_date).getMonth();m[k]=(m[k]||0)+(calcProfit(i)||0)});
  return Object.keys(m).sort((a,b)=>+a-+b).map(k=>({month:MONTHS[k],profit:Math.round(m[k]*100)/100}));
}
function avgDays(items){
  const s=items.filter(i=>i.status==="sold"&&i.sale_date&&i.purchase_date);
  if(!s.length)return null;
  return Math.round(s.reduce((a,i)=>a+(new Date(i.sale_date)-new Date(i.purchase_date))/864e5,0)/s.length);
}
function byCategory(items){
  const m={};
  items.filter(i=>i.status==="sold").forEach(i=>{const c=i.category||"Altro",p=calcProfit(i)||0,cost=(i.purchase_price||0)+(i.purchase_shipping||0);if(!m[c])m[c]={profit:0,count:0,invested:0};m[c].profit+=p;m[c].count++;m[c].invested+=cost});
  return Object.entries(m).map(([cat,v])=>({cat,profit:Math.round(v.profit*100)/100,count:v.count,margin:v.invested?Math.round(v.profit/v.invested*100):0})).sort((a,b)=>b.profit-a.profit);
}

const st={
  sidebar:{width:240,minWidth:240,background:"#0F0F1A",borderRight:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",padding:"32px 0 24px",position:"sticky",top:0,height:"100vh"},
  logo:{padding:"0 24px 28px",borderBottom:"1px solid rgba(255,255,255,0.06)",marginBottom:16},
  main:{flex:1,minWidth:0,padding:"40px 40px 80px"},
  stat:{background:"#0F0F1A",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"20px 22px",position:"relative",overflow:"hidden"},
  card:{background:"#0F0F1A",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"22px 24px"},
  row:{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.055)",borderRadius:10,padding:"14px 16px",display:"grid",gridTemplateColumns:"1fr 90px 90px 110px 95px 100px 24px",alignItems:"center",gap:10,cursor:"pointer",marginBottom:5,position:"relative",overflow:"hidden"},
  overlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(16px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"},
  modal:{background:"#0F0F1A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:36,width:500,maxWidth:"93vw",maxHeight:"92vh",overflowY:"auto",position:"relative"},
  input:{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"11px 13px",color:"#e2e8f0",fontSize:14,outline:"none"},
  label:{display:"block",fontSize:10,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:6},
};

function pill(color){return{fontSize:10,fontWeight:600,padding:"4px 10px",borderRadius:20,textAlign:"center",whiteSpace:"nowrap",background:color+"20",color,border:"1px solid "+color+"40"}}

function Pill({status}){const c=SC[status]||"#555";return <span style={pill(c)}>{SL[status]||status}</span>}

function StatCard({label,val,sub,color}){
  return <div style={st.stat}>
    <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 5% 90%, "+color+"18, transparent 60%)",pointerEvents:"none"}}/>
    <div style={{fontSize:11,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:8}}>{label}</div>
    <div style={{fontSize:32,fontWeight:800,letterSpacing:-1.5,lineHeight:1,marginBottom:4,color}}>{val}</div>
    <div style={{fontSize:11,color:"#3a3a5a"}}>{sub}</div>
  </div>;
}

function ItemRow({item,onClick}){
  const profit=calcProfit(item),roi=calcRoi(item),accent=SC[item.status]||"#555",pc=platColors[item.purchase_platform]||"#818cf8";
  return <div style={Object.assign({},st.row)} onClick={()=>onClick(item)}>
    <div style={{position:"absolute",left:0,top:"20%",bottom:"20%",width:2.5,borderRadius:"0 2px 2px 0",background:accent}}/>
    <div>
      <div style={{fontSize:13,fontWeight:600,color:"#d0d0e8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",paddingLeft:10}}>{item.product_name}</div>
      <div style={{fontSize:10,color:"#2a2a4a",marginTop:2,paddingLeft:10}}>{item.category} · {item.purchase_date}</div>
    </div>
    <div className="hidemd" style={{fontSize:14,fontWeight:700,textAlign:"right",color:"#F43F5E"}}>€{item.purchase_price}</div>
    <div className="hidemd" style={{fontSize:14,fontWeight:700,textAlign:"right",color:item.status==="sold"?"#22C55E":"#2a2a4a"}}>{item.status==="sold"?"€"+item.sale_price:"—"}</div>
    <div className="hidemd" style={{textAlign:"right"}}>
      <div style={{fontSize:14,fontWeight:700,color:profit!=null?(profit>=0?"#22C55E":"#F43F5E"):"#2a2a4a"}}>{profit!=null?(profit>=0?"+":"")+"€"+profit.toFixed(2):"—"}</div>
      {roi!=null&&<div style={{fontSize:10,color:"#2a2a4a"}}>{roi}% roi</div>}
    </div>
    <span className="hidemd" style={pill(pc)}>{item.purchase_platform||"—"}</span>
    <div className="hidemd"><Pill status={item.status}/></div>
    <div className="hidemd" style={{color:"#2a2a4a",textAlign:"right"}}>›</div>
  </div>;
}

function DetailModal({item,onClose}){
  const profit=calcProfit(item),roi=calcRoi(item),totalCost=(item.purchase_price||0)+(item.purchase_shipping||0);
  const boxes=[
    {l:"Costo totale",v:"€"+totalCost.toFixed(2),c:"#F43F5E"},
    {l:"Ricavo netto",v:item.status==="sold"?"€"+((item.sale_price||0)-(item.sale_shipping||0)-(item.fees||0)).toFixed(2):"—",c:"#22C55E"},
    {l:"Profitto",v:profit!=null?(profit>=0?"+":"")+"€"+profit.toFixed(2):"—",c:profit!=null?(profit>=0?"#22C55E":"#F43F5E"):"#2a2a4a"},
    {l:"ROI",v:roi!=null?roi+"%":"—",c:roi!=null?"#F59E0B":"#2a2a4a"},
  ];
  const info=[["Acquistato su",item.purchase_platform||"—"],["Venduto su",item.sale_platform||"—"],["Data acquisto",item.purchase_date||"—"],["Data vendita",item.sale_date||"—"],["Prezzo acquisto","€"+(item.purchase_price||0)],["Prezzo vendita",item.sale_price?"€"+item.sale_price:"—"],["Sped. acquisto","€"+(item.purchase_shipping||0)],["Sped. vendita","€"+(item.sale_shipping||0)],["Commissioni","€"+(item.fees||0)],["Prezzo listing",item.listing_price?"€"+item.listing_price:"—"]];
  return <div style={st.overlay} onClick={onClose}>
    <div style={st.modal} onClick={e=>e.stopPropagation()}>
      <button style={{position:"absolute",top:18,right:18,background:"rgba(255,255,255,0.07)",border:"none",color:"#6060a0",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16}} onClick={onClose}>×</button>
      <div style={{fontSize:19,fontWeight:700,color:"#fff",marginBottom:6,paddingRight:40}}>{item.product_name}</div>
      <div style={{fontSize:11,color:"#3a3a5a",marginBottom:24,display:"flex",alignItems:"center",gap:5}}>{item.category} · <Pill status={item.status}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {boxes.map(b=><div key={b.l} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:0.7,color:"#3a3a5a",marginBottom:6}}>{b.l}</div>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:-1,color:b.c}}>{b.v}</div>
        </div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {info.map(([k,v])=><div key={k} style={{background:"rgba(255,255,255,0.025)",borderRadius:10,padding:"10px 12px"}}>
          <div style={{fontSize:10,fontWeight:600,color:"#2a2a4a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:3}}>{k}</div>
          <div style={{fontSize:13,color:"#9090b0",fontWeight:500}}>{v}</div>
        </div>)}
      </div>
      {item.notes&&<div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"14px 16px"}}>
        <div style={{fontSize:10,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:8}}>Note</div>
        <div style={{fontSize:13,color:"#7070a0",lineHeight:1.6}}>{item.notes}</div>
      </div>}
    </div>
  </div>;
}

function FormModal({onClose,onSaved}){
  const [saving,setSaving]=useState(false),[err,setErr]=useState(null);
  const [f,setF]=useState({product_name:"",category:"videogame",purchase_platform:"Subito",purchase_price:"",purchase_shipping:"0",purchase_date:"",sale_platform:"",sale_price:"",sale_shipping:"0",fees:"0",sale_date:"",listing_date:"",listing_price:"",status:"online",notes:""});
  const set=(k,v)=>setF(x=>Object.assign({},x,{[k]:v}));
  const save=async()=>{
    if(!f.product_name||!f.purchase_price||!f.purchase_date){setErr("Compila nome, prezzo e data acquisto.");return}
    setSaving(true);setErr(null);
    try{
      await insertProduct({product_name:f.product_name,category:f.category,purchase_platform:f.purchase_platform,purchase_price:parseFloat(f.purchase_price)||0,purchase_shipping:parseFloat(f.purchase_shipping)||0,purchase_date:f.purchase_date||null,sale_platform:f.sale_platform||null,sale_price:parseFloat(f.sale_price)||0,sale_shipping:parseFloat(f.sale_shipping)||0,fees:parseFloat(f.fees)||0,sale_date:f.sale_date||null,listing_date:f.listing_date||null,listing_price:parseFloat(f.listing_price)||0,status:f.status,notes:f.notes||null,profit:0});
      onSaved();onClose();
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  };
  const Field=({label,k,type})=><div style={{marginBottom:13}}><label style={st.label}>{label}</label><input style={st.input} type={type||"text"} value={f[k]} onChange={e=>set(k,e.target.value)}/></div>;
  return <div style={st.overlay} onClick={onClose}>
    <div style={st.modal} onClick={e=>e.stopPropagation()}>
      <button style={{position:"absolute",top:18,right:18,background:"rgba(255,255,255,0.07)",border:"none",color:"#6060a0",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16}} onClick={onClose}>×</button>
      <div style={{fontSize:19,fontWeight:700,color:"#fff",marginBottom:24}}>Nuovo articolo</div>
      {err&&<div style={{background:"rgba(244,63,94,0.08)",border:"1px solid rgba(244,63,94,0.2)",borderRadius:12,padding:"16px 20px",color:"#f87171",fontSize:13,marginBottom:20}}>{err}</div>}
      <div style={{marginBottom:13}}><label style={st.label}>Nome *</label><input style={st.input} value={f.product_name} onChange={e=>set("product_name",e.target.value)}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{marginBottom:13}}><label style={st.label}>Categoria</label><select style={st.input} value={f.category} onChange={e=>set("category",e.target.value)}><option value="videogame">Videogioco</option><option value="console">Console</option><option value="accessory">Accessorio</option></select></div>
        <div style={{marginBottom:13}}><label style={st.label}>Stato</label><select style={st.input} value={f.status} onChange={e=>set("status",e.target.value)}><option value="online">Online</option><option value="to_publish">Da pubblicare</option><option value="sold">Venduto</option></select></div>
      </div>
      <div style={{fontSize:10,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,margin:"18px 0 12px",paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.05)"}}>Acquisto</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <Field label="Prezzo (€) *" k="purchase_price" type="number"/>
        <Field label="Spedizione (€)" k="purchase_shipping" type="number"/>
        <div style={{marginBottom:13}}><label style={st.label}>Piattaforma</label><select style={st.input} value={f.purchase_platform} onChange={e=>set("purchase_platform",e.target.value)}><option>Subito</option><option>Vinted</option><option>eBay</option><option>Marketplace</option><option>Altra</option></select></div>
      </div>
      <Field label="Data acquisto *" k="purchase_date" type="date"/>
      <div style={{fontSize:10,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,margin:"18px 0 12px",paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.05)"}}>Vendita (opzionale)</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <Field label="Prezzo (€)" k="sale_price" type="number"/>
        <Field label="Spedizione (€)" k="sale_shipping" type="number"/>
        <Field label="Commissioni (€)" k="fees" type="number"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{marginBottom:13}}><label style={st.label}>Piattaforma vendita</label><select style={st.input} value={f.sale_platform} onChange={e=>set("sale_platform",e.target.value)}><option value="">— nessuna —</option><option>eBay</option><option>Vinted</option><option>Subito</option><option>Altra</option></select></div>
        <Field label="Data vendita" k="sale_date" type="date"/>
      </div>
      <div style={{fontSize:10,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,margin:"18px 0 12px",paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.05)"}}>Listing (opzionale)</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Prezzo listing (€)" k="listing_price" type="number"/>
        <Field label="Data listing" k="listing_date" type="date"/>
      </div>
      <div style={{marginBottom:13}}><label style={st.label}>Note</label><textarea style={Object.assign({},st.input,{minHeight:80,resize:"vertical",fontSize:13,lineHeight:1.6})} value={f.notes} onChange={e=>set("notes",e.target.value)}/></div>
      <button style={{width:"100%",background:"#6C63FF",color:"#fff",border:"none",borderRadius:10,padding:13,fontWeight:600,fontSize:14,cursor:"pointer",marginTop:4,opacity:saving?0.6:1}} onClick={save} disabled={saving}>{saving?"Salvataggio...":"+ Salva articolo"}</button>
    </div>
  </div>;
}

function RowList({items,onSelect}){
  if(!items.length)return <div style={{color:"#2a2a4a",fontSize:13,textAlign:"center",padding:"40px 0"}}>Nessun articolo.</div>;
  return <div>
    <div className="colheader" style={{display:"grid",gridTemplateColumns:"1fr 90px 90px 110px 95px 100px 24px",gap:10,padding:"0 16px 10px",fontSize:10,fontWeight:600,color:"#2a2a4a",textTransform:"uppercase",letterSpacing:0.7}}>
      <div style={{paddingLeft:10}}>Articolo</div><div style={{textAlign:"right"}}>Acquisto</div><div style={{textAlign:"right"}}>Vendita</div><div style={{textAlign:"right"}}>Profitto</div><div>Comprato su</div><div>Stato</div><div></div>
    </div>
    {items.map(i=><ItemRow key={i.id} item={i} onClick={onSelect}/>)}
  </div>;
}

function Dashboard({items,onSelect}){
  const sold=items.filter(i=>i.status==="sold");
  const inv=items.reduce((s,i)=>s+(i.purchase_price||0)+(i.purchase_shipping||0),0);
  const profit=sold.reduce((s,i)=>s+(calcProfit(i)||0),0);
  const rev=sold.reduce((s,i)=>s+(i.sale_price||0),0);
  const days=avgDays(items);
  const roi=sold.length?Math.round(profit/sold.reduce((s,i)=>s+(i.purchase_price||0)+(i.purchase_shipping||0),0)*100):0;
  const mData=monthlyProfit(items),cats=byCategory(items),maxP=cats.length?cats[0].profit:1;
  return <div>
    <div className="stats" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:28}}>
      <StatCard label="Profitto netto" val={"+€"+profit.toFixed(2)} sub={"ROI medio "+roi+"%"} color="#22C55E"/>
      <StatCard label="Capitale invest." val={"€"+inv.toFixed(2)} sub={items.length+" articoli"} color="#F43F5E"/>
      <StatCard label="Incassato" val={"€"+rev.toFixed(2)} sub={sold.length+" vendite"} color="#6C63FF"/>
      <StatCard label="Tempo medio" val={days!=null?days+"gg":"—"} sub="giorni per vendere" color="#F59E0B"/>
    </div>
    <div className="grid2" style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:16,marginBottom:16}}>
      <div style={st.card}>
        <div style={{fontSize:12,fontWeight:600,color:"#4a4a6a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:18}}>Profitti mensili</div>
        {mData.length>0?(()=>{const maxV=Math.max.apply(null,mData.map(d=>d.profit));return <div style={{display:"flex",alignItems:"flex-end",gap:12,height:180,paddingTop:20}}>{mData.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:8,height:"100%",justifyContent:"flex-end"}}><div style={{fontSize:11,fontWeight:700,color:"#A5A0FF"}}>€{d.profit}</div><div style={{width:"100%",maxWidth:40,borderRadius:"6px 6px 0 0",background:"#6C63FF",opacity:i===mData.length-1?1:0.55,height:Math.max(4,Math.round(d.profit/maxV*120))+"px",transition:"height 0.5s"}}/><div style={{fontSize:11,color:"#3a3a5a"}}>{d.month}</div></div>)}</div>})():<div style={{color:"#2a2a4a",fontSize:13,textAlign:"center",padding:"40px 0"}}>Nessuna vendita</div>}
      </div>
      <div style={st.card}>
        <div style={{fontSize:12,fontWeight:600,color:"#4a4a6a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:18}}>Categorie profittevoli</div>
        {cats.map(c=><div key={c.cat} style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:600,color:"#c0c0e0"}}>{c.cat}</span><span style={{fontSize:13,fontWeight:700,color:"#fff"}}>+€{c.profit.toFixed(2)}</span></div>
          <div style={{height:5,background:"rgba(255,255,255,0.05)",borderRadius:10,overflow:"hidden"}}><div style={{height:"100%",borderRadius:10,width:Math.round(c.profit/maxP*100)+"%",background:"#6C63FF"}}/></div>
          <div style={{fontSize:10,color:"#3a3a5a",marginTop:4}}>Margine {c.margin}% · {c.count} venduti</div>
        </div>)}
      </div>
    </div>
    <div style={{fontSize:11,fontWeight:600,color:"#3a3a5a",textTransform:"uppercase",letterSpacing:0.7,marginBottom:12,marginTop:16}}>Attività recente</div>
    <RowList items={items.slice(0,6)} onSelect={onSelect}/>
  </div>;
}

function App(){
  const [page,setPage]=useState("dashboard");
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [selected,setSelected]=useState(null);
  const [showForm,setShowForm]=useState(false);

  const load=async()=>{
    setLoading(true);setError(null);
    try{const d=await fetchProducts();setItems(d)}catch(e){setError(e.message)}finally{setLoading(false)}
  };
  useEffect(()=>{load()},[]);

  const badges={dashboard:items.length,acquisti:items.length,vendite:items.filter(i=>i.status==="sold").length,stock:items.filter(i=>i.status==="online"||i.status==="to_publish").length};
  const meta={dashboard:["Dashboard","Panoramica della tua attività"],acquisti:["Acquisti","Tutto quello che hai comprato"],vendite:["Vendite","Articoli venduti e profitti"],stock:["Stock","Articoli online e da pubblicare"]};

  let content;
  if(loading) content=<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"80px 0",gap:14,color:"#3a3a5a"}}><div className="spin" style={{width:32,height:32,border:"3px solid rgba(108,99,255,0.2)",borderTopColor:"#6C63FF",borderRadius:"50%"}}/><span>Caricamento...</span></div>;
  else if(page==="dashboard") content=<Dashboard items={items} onSelect={setSelected}/>;
  else if(page==="acquisti"){const t=items.reduce((s,i)=>s+(i.purchase_price||0)+(i.purchase_shipping||0),0);content=<div><div className="stats" style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14,marginBottom:28}}><StatCard label="Totale investito" val={"€"+t.toFixed(2)} sub={items.length+" acquisti"} color="#F43F5E"/><StatCard label="Spesa media" val={"€"+(items.length?Math.round(t/items.length*100)/100:0)} sub="per articolo" color="#6C63FF"/></div><RowList items={items} onSelect={setSelected}/></div>}
  else if(page==="vendite"){const sold=items.filter(i=>i.status==="sold");const p=sold.reduce((s,i)=>s+(calcProfit(i)||0),0);const r=sold.length?Math.round(p/sold.reduce((s,i)=>s+(i.purchase_price||0)+(i.purchase_shipping||0),0)*100):0;content=<div><div className="stats" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:28}}><StatCard label="Venduti" val={sold.length} sub="completati" color="#22C55E"/><StatCard label="Incassato" val={"€"+sold.reduce((s,i)=>s+(i.sale_price||0),0).toFixed(2)} sub="totale" color="#22C55E"/><StatCard label="Profitto" val={"+€"+p.toFixed(2)} sub={"ROI medio "+r+"%"} color="#F59E0B"/></div><RowList items={sold} onSelect={setSelected}/></div>}
  else if(page==="stock"){const stock=items.filter(i=>i.status==="online"||i.status==="to_publish");const on=items.filter(i=>i.status==="online");const inv=stock.reduce((s,i)=>s+(i.purchase_price||0)+(i.purchase_shipping||0),0);content=<div><div className="stats" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:28}}><StatCard label="In stock" val={stock.length} sub="totale" color="#F59E0B"/><StatCard label="Online" val={on.length} sub="già in vendita" color="#6C63FF"/><StatCard label="Capitale bloccato" val={"€"+inv.toFixed(2)} sub="da recuperare" color="#F43F5E"/></div><RowList items={stock} onSelect={setSelected}/></div>}

  return <div style={{display:"flex",minHeight:"100vh",background:"#0A0A0F",color:"#E2E8F0",fontSize:14}}>
    <aside className="sidebar" style={st.sidebar}>
      <div style={st.logo}><div style={{fontSize:20,fontWeight:800,letterSpacing:-0.5,color:"#fff"}}>Flip<span style={{color:"#6C63FF"}}>Track</span></div><div style={{fontSize:11,color:"#3a3a5a",marginTop:4}}>videogiochi & console</div></div>
      <nav style={{flex:1,padding:"0 12px"}}>
        {NAV.map(n=><div key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:500,color:page===n.id?"#A5A0FF":"#4a4a6a",background:page===n.id?"rgba(108,99,255,0.15)":"transparent",marginBottom:2}}>{n.label}<span style={{marginLeft:"auto",fontSize:11,fontWeight:600,background:page===n.id?"rgba(108,99,255,0.2)":"rgba(255,255,255,0.05)",color:page===n.id?"#A5A0FF":"#4a4a6a",padding:"2px 8px",borderRadius:20}}>{badges[n.id]}</span></div>)}
      </nav>
      <div style={{padding:"16px 12px 0",borderTop:"1px solid rgba(255,255,255,0.06)"}}><button style={{width:"100%",background:"#6C63FF",color:"#fff",border:"none",borderRadius:10,padding:12,fontWeight:600,fontSize:14,cursor:"pointer"}} onClick={()=>setShowForm(true)}>+ Nuovo articolo</button></div>
    </aside>
    <main className="mainpad" style={st.main}>
      <div style={{marginBottom:32,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div><div style={{fontSize:26,fontWeight:700,letterSpacing:-0.8,color:"#fff"}}>{meta[page][0]}</div><div style={{fontSize:13,color:"#3a3a5a",marginTop:4}}>{meta[page][1]}</div></div>
        <button style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#4a4a6a",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:12}} onClick={load}>↻ Aggiorna</button>
      </div>
      {error&&<div style={{background:"rgba(244,63,94,0.08)",border:"1px solid rgba(244,63,94,0.2)",borderRadius:12,padding:"16px 20px",color:"#f87171",fontSize:13,marginBottom:20}}>{error}</div>}
      {content}
    </main>
    <nav className="mobnav" style={{display:"none",position:"fixed",bottom:0,left:0,right:0,background:"rgba(10,10,15,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.07)",padding:"10px 0 20px",zIndex:90,justifyContent:"space-around"}}>
      {NAV.map(n=><div key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",padding:"4px 16px",fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:0.7,color:page===n.id?"#6C63FF":"#3a3a5a"}}>{n.label}</div>)}
    </nav>
    <button className="fab" style={{display:"none",position:"fixed",bottom:84,right:18,background:"#6C63FF",color:"#fff",border:"none",borderRadius:"50%",width:52,height:52,fontSize:24,cursor:"pointer",boxShadow:"0 8px 24px rgba(108,99,255,0.4)",zIndex:91,alignItems:"center",justifyContent:"center"}} onClick={()=>setShowForm(true)}>+</button>
    {selected&&<DetailModal item={selected} onClose={()=>setSelected(null)}/>}
    {showForm&&<FormModal onClose={()=>setShowForm(false)} onSaved={load}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
